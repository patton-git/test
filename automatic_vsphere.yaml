---
- name: automatic vsphere configure
  hosts: localhost
  gather_facts: false

  vars:
    ansible_python_interpreter: /bin/python3
    vcenter_hostname: "vcsa.vclass.local"
    vcenter_username: "administrator@vsphere.local"
    datacenter_name: "Mokdong"
    cluster_name: "DevOps"
    cluster_hosts:
      - { name: esx-01.vclass.local, ip_iscsi_1: 10.10.11.11, ip_iscsi_2: 10.10.11.21, ip_vmotion: 10.10.12.11 }
      - { name: esx-02.vclass.local, ip_iscsi_1: 10.10.11.12, ip_iscsi_2: 10.10.11.22, ip_vmotion: 10.10.12.12 }
      - { name: esx-03.vclass.local, ip_iscsi_1: 10.10.11.13, ip_iscsi_2: 10.10.11.23, ip_vmotion: 10.10.12.13 }
      # - { name: esx-04.vclass.local, ip_iscsi_1: 10.10.11.14, ip_iscsi_2: 10.10.11.24, ip_vmotion: 10.10.12.14 }
    iscsi_target_ip: "10.10.10.1"  
    
  vars_prompt:
    - name: vcenter_password
      prompt: "vCenter 비밀번호를 입력하세요 (administrator@vsphere.local)"
      private: true  # 키보드 입력 시 화면에 문자가 표시되지 않음
    - name: host_password
      prompt: "ESX host의 Root 비밀번호를 입력하세요"
      private: true  # 키보드 입력 시 화면에 문자가 표시되지 않음


  tasks: 

    - name: 01.Create Datacenter
      community.vmware.vmware_datacenter:
        hostname: '{{ vcenter_hostname }}'
        username: '{{ vcenter_username }}'
        password: '{{ vcenter_password }}'
        validate_certs: no
        datacenter_name: '{{ datacenter_name }}'
        state: present
      delegate_to: localhost

    - name: 02.Create Cluster
      vmware.vmware.cluster:
        hostname: '{{ vcenter_hostname }}'
        username: '{{ vcenter_username }}'
        password: '{{ vcenter_password }}'
        validate_certs: no
        datacenter_name: '{{ datacenter_name }}'
        cluster_name: '{{ cluster_name }}'
      delegate_to: localhost

    - name: 03.Add ESX Host to cluster
      community.vmware.vmware_host:
        hostname: '{{ vcenter_hostname }}'
        username: '{{ vcenter_username }}'
        password: '{{ vcenter_password }}'
        validate_certs: no
        datacenter_name: '{{ datacenter_name }}'
        cluster_name: '{{ cluster_name }}'
        esxi_hostname: '{{ item.name }}'
        esxi_username: 'root'
        esxi_password: "{{ host_password }}"
        state: present
        loop: "{{ cluster_hosts }}"
      delegate_to: localhost

    - name: 04.Create dvSwitch
      community.vmware.vmware_dvswitch:
        hostname: '{{ vcenter_hostname }}'
        username: '{{ vcenter_username }}'
        password: '{{ vcenter_password }}'
        datacenter: '{{ datacenter_name }}'
        switch: dvSwitch
        version: 9.0.0
        mtu: 9000
        uplink_quantity: 2
        state: present
      delegate_to: localhost


    - name: 05.Add Hosts to dVS
      community.vmware.vmware_dvs_host:
        hostname: '{{ vcenter_hostname }}'
        username: '{{ vcenter_username }}'
        password: '{{ vcenter_password }}'
        esxi_hostname: '{{ item.name }}'
        switch_name: dvSwitch
        vmnics:
          - vmnic1
          - vmnic3
        state: present
      loop: "{{ cluster_hosts }}"
      delegate_to: localhost


    - name: 06.Create iSCSI-P1 Portgroup
      community.vmware.vmware_dvs_portgroup:
        hostname: '{{ vcenter_hostname }}'
        username: '{{ vcenter_username }}'
        password: '{{ vcenter_password }}'
        portgroup_name: iSCSI-P1
        switch_name: dvSwitch
        vlan_id: 11
        state: present
        port_binding: static
        teaming_policy:
          load_balance_policy: failover_explicit
          rolling_order: "true"
          active_uplinks: "Uplink 1"
      delegate_to: localhost

    - name: 07.Create iSCSI-P2 Portgroup
      community.vmware.vmware_dvs_portgroup:
        hostname: '{{ vcenter_hostname }}'
        username: '{{ vcenter_username }}'
        password: '{{ vcenter_password }}'
        portgroup_name: iSCSI-P2
        switch_name: dvSwitch
        vlan_id: 11
        state: present
        port_binding: static
        teaming_policy:
          load_balance_policy: failover_explicit
          rolling_order: "true"
          active_uplinks: "Uplink 2"
      delegate_to: localhost


    - name: 08.Add 1st iSCSI vmkernel port
      community.vmware.vmware_vmkernel:
        hostname: '{{ vcenter_hostname }}'
        username: '{{ vcenter_username }}'
        password: '{{ vcenter_password }}'
        esxi_hostname: '{{ item.name }}'
        dvswitch_name: dvSwitch
        portgroup_name: iSCSI-P1
        network:
          type: 'static'
          ip_address: "{{ item.ip_iscsi_1 }}"
          subnet_mask: 255.255.255.0
        state: present
      loop: "{{ cluster_hosts }}"
      delegate_to: localhost


    - name: 09.Add 2nd iSCSI vmkernel port
      community.vmware.vmware_vmkernel:
        hostname: '{{ vcenter_hostname }}'
        username: '{{ vcenter_username }}'
        password: '{{ vcenter_password }}'
        esxi_hostname: '{{ item.name }}'
        dvswitch_name: dvSwitch
        portgroup_name: iSCSI-P2
        network:
          type: 'static'
          ip_address: "{{ item.ip_iscsi_2 }}"
          subnet_mask: 255.255.255.0
        state: present
      loop: "{{ cluster_hosts }}"
      delegate_to: localhost

    - name: 10.Enable iSCSI 
      community.vmware.vmware_host_iscsi:
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        esxi_hostname: "{{ item.name }}"
        state: enabled
      loop: "{{ cluster_hosts }}"
      delegate_to: localhost

    - name: 11.iSCSI (vmhba64) Port binding
      community.vmware.vmware_host_iscsi:
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        esxi_hostname: "{{ item.name }}"
        iscsi_config:
          vmhba_name: vmhba64
          port_bind:
            - vmk1
            - vmk2
        state: present
      loop: "{{ cluster_hosts }}"
      delegate_to: localhost

    - name: 12.Add a dynamic target to iSCSI config of ESXi
      community.vmware.vmware_host_iscsi:
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        esxi_hostname: "{{ esxi_hostname }}"
        iscsi_config:
          vmhba_name: vmhba65
          send_target:
          address: "{{ iscsi_target_ip }}"
        state: present
      loop: "{{ cluster_hosts }}"
      delegate_to: localhost

    - name: 13.Recan HBA for cluster
      community.vmware.vmware_host_scanhba:
        hostname: '{{ vcenter_hostname }}'
        username: '{{ vcenter_username }}'
        password: '{{ vcenter_password }}'
        cluster_name: '{{ cluster_name }}'
        rescan_hba: true
      delegate_to: localhost


    - name: 11.Wait for complete rescan HBA
      wait_for:
        timeout: 10
      delegate_to: localhost


    - name: 12.Mount iSCSI-01 datastore
      community.vmware.vmware_host_datastore:
        hostname: '{{ vcenter_hostname }}'
        username: '{{ vcenter_username }}'
        password: '{{ vcenter_password }}'
        validate_certs: no
        datastore_name: 'iSCSI-Horizon'
        datastore_type: 'vmfs'
        vmfs_device_name: 'naa.60003ff44dc75adc881b96b330bc1bdc'
        vmfs_version: 6
        esxi_hostname: '{{ item }}'
        state: present
      loop:
        - "sa-esxi-01.vclass.local"
        - "sa-esxi-02.vclass.local"
        - "sa-esxi-03.vclass.local"
      delegate_to: localhost


    - name: 13.Create Subscribed Content Library
      community.vmware.vmware_content_library_manager:
        hostname: '{{ vcenter_hostname }}'
        username: '{{ vcenter_username }}'
        password: '{{ vcenter_password }}'
        validate_certs: no
        library_name: from-vcsa.edu.git
        library_description: 'Subscribed Library from vcsa.edu.git'
        library_type: subscribed
        datastore_name: iSCSI-Horizon
        subscription_url: 'https://vcsa.edu.git:443/cls/vcsp/lib/8abf3e66-df94-4abd-9b6f-9ae81b54110b/lib.json'
        ssl_thumbprint: 'F2:4B:22:E2:AF:F0:69:70:44:76:9C:70:49:5C:C8:1C:26:26:3D:D8'
        update_on_demand: true
        state: present
      delegate_to: localhost


    - name: 14.Create dvSwitch
      community.vmware.vmware_dvswitch:
        hostname: '{{ vcenter_hostname }}'
        username: '{{ vcenter_username }}'
        password: '{{ vcenter_password }}'
        validate_certs: no
        datacenter: '{{ datacenter_name }}'
        switch: DSwitch
        version: 7.0.3
        uplink_quantity: 2
        state: present
      delegate_to: localhost

    - name: 15.Add Host to dVS
      community.vmware.vmware_dvs_host:
        hostname: '{{ vcenter_hostname }}'
        username: '{{ vcenter_username }}'
        password: '{{ vcenter_password }}'
        validate_certs: no        
        esxi_hostname: '{{ item }}'
        switch_name: DSwitch
        vmnics:
          - vmnic2
          - vmnic3
        state: present
      loop:
        - "sa-esxi-01.vclass.local"
        - "sa-esxi-02.vclass.local"
        - "sa-esxi-03.vclass.local"
      delegate_to: localhost

    - name: 16.Create vlan portgroup - Mgmt - 10
      community.vmware.vmware_dvs_portgroup:
        hostname: '{{ vcenter_hostname }}'
        username: '{{ vcenter_username }}'
        password: '{{ vcenter_password }}'
        validate_certs: no        
        portgroup_name: DPG-Mgmt
        switch_name: DSwitch
        vlan_id: 10
        port_binding: static
        state: present
      delegate_to: localhost

    - name: 17.Create vlan portgroup - vMotion - 12
      community.vmware.vmware_dvs_portgroup:
        hostname: '{{ vcenter_hostname }}'
        username: '{{ vcenter_username }}'
        password: '{{ vcenter_password }}'
        validate_certs: no        
        portgroup_name: DPG-vMotion
        switch_name: DSwitch
        vlan_id: 12
        port_binding: static
        state: present
      delegate_to: localhost

    - name: 18.Create vlan portgroup - Production - 13
      community.vmware.vmware_dvs_portgroup:
        hostname: '{{ vcenter_hostname }}'
        username: '{{ vcenter_username }}'
        password: '{{ vcenter_password }}'
        validate_certs: no        
        portgroup_name: DPG-Prod-Internal
        switch_name: DSwitch
        vlan_id: 13
        port_binding: static
        state: present
      delegate_to: localhost


    - name: 19.Add vMotion vmkernel port
      community.vmware.vmware_vmkernel:
        hostname: '{{ vcenter_hostname }}'
        username: '{{ vcenter_username }}'
        password: '{{ vcenter_password }}'
        validate_certs: no
        esxi_hostname: '{{ item.esxi_host }}'
        dvswitch_name: DSwitch
        portgroup_name: DPG-vMotion
        network:
          type: 'static'
          ip_address: '{{ item.vmotionip }}'
          subnet_mask: 255.255.255.0
          tcpip_stack: vmotion
        state: present
        enable_vmotion: yes
      with_items:
      - { esxi_host: sa-esxi-01.vclass.local, vmotionip: 10.10.12.11 }
      - { esxi_host: sa-esxi-02.vclass.local, vmotionip: 10.10.12.12 }
      - { esxi_host: sa-esxi-03.vclass.local, vmotionip: 10.10.12.13 }
      delegate_to: localhost


    - name: 20.vmoption tcp/ip stack gateway
      community.vmware.vmware_host_tcpip_stacks:
        hostname: '{{ item }}'
        username: '{{ esxi_username }}'
        password: '{{ esxi_password }}'
        validate_certs: no
        esxi_hostname: '{{ item }}'        
        vmotion:
          gateway: 10.10.12.1
      loop:
        - "sa-esxi-01.vclass.local"
        - "sa-esxi-02.vclass.local"
        - "sa-esxi-03.vclass.local"
      delegate_to: localhost    

    - name: 21.Enable HA with admission control FTT=1
      community.vmware.vmware_cluster_ha:
        hostname: '{{ vcenter_hostname }}'
        username: '{{ vcenter_username }}'
        password: '{{ vcenter_password }}'
        validate_certs: no        
        datacenter_name: '{{ datacenter_name }}'
        cluster_name: '{{ cluster_name }}'
        enable: true
        reservation_based_admission_control:
          auto_compute_percentages: True
          failover_level: 1
      delegate_to: localhost    
      
    - name: 22.Enable DRS
      community.vmware.vmware_cluster_drs:
        hostname: '{{ vcenter_hostname }}'
        username: '{{ vcenter_username }}'
        password: '{{ vcenter_password }}'
        validate_certs: no        
        datacenter_name: '{{ datacenter_name }}'
        cluster_name: '{{ cluster_name }}'
        enable: true
      delegate_to: localhost    
