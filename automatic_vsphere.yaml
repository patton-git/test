---
- name: automatic vsphere configure
  hosts: localhost
  gather_facts: false

  vars:
    ansible_python_interpreter: /bin/python3
    vcenter_hostname: "vcsa.vclass.local"
    vcenter_username: "administrator@vsphere.local"
    datacenter_name: "Mokdong"
    cluster_name: "DevOps"
    cluster_hosts:
      - { name: esx-01.vclass.local, ip_iscsi_1: 10.10.11.11, ip_iscsi_2: 10.10.11.21, ip_vmotion: 10.10.12.11 }
      - { name: esx-02.vclass.local, ip_iscsi_1: 10.10.11.12, ip_iscsi_2: 10.10.11.22, ip_vmotion: 10.10.12.12 }
      - { name: esx-03.vclass.local, ip_iscsi_1: 10.10.11.13, ip_iscsi_2: 10.10.11.23, ip_vmotion: 10.10.12.13 }
      - { name: esx-04.vclass.local, ip_iscsi_1: 10.10.11.14, ip_iscsi_2: 10.10.11.24, ip_vmotion: 10.10.12.14 }
    iscsi_target_ip: "10.10.11.1"  
    project_pgs:
      - { name: DPG-vMotion, vlan: 12 }
      - { name: DPG-Prod,    vlan: 13 }
      - { name: DPG-Test,    vlan: 14 }
      - { name: DPG-Dev,     vlan: 15 }
    project_vms:
      - { name: prod-01, pg: DPG-Prod, ip: 10.10.13.11, gw: 10.10.13.1 }
      - { name: prod-02, pg: DPG-Prod, ip: 10.10.13.12, gw: 10.10.13.1 }
      - { name: test-01, pg: DPG-Test, ip: 10.10.14.11, gw: 10.10.14.1 }
      - { name: test-02, pg: DPG-Test, ip: 10.10.14.12, gw: 10.10.14.1 }
      - { name: dev-01,  pg: DPG-Dev,  ip: 10.10.15.11, gw: 10.10.15.1 }
      - { name: dev-02,  pg: DPG-Dev,  ip: 10.10.15.12, gw: 10.10.15.1 }
      
          
  vars_prompt:
    - name: vcenter_password
      prompt: "vCenter 비밀번호를 입력하세요 (administrator@vsphere.local)"
      private: true  # 키보드 입력 시 화면에 문자가 표시되지 않음
    - name: host_password
      prompt: "ESX host의 Root 비밀번호를 입력하세요"
      private: true  # 키보드 입력 시 화면에 문자가 표시되지 않음


  tasks: 

    - name: 01.Create Datacenter
      community.vmware.vmware_datacenter:
        hostname: '{{ vcenter_hostname }}'
        username: '{{ vcenter_username }}'
        password: '{{ vcenter_password }}'
        validate_certs: no
        datacenter_name: '{{ datacenter_name }}'
        state: present
      delegate_to: localhost

    - name: 02.Create Cluster
      vmware.vmware.cluster:
        hostname: '{{ vcenter_hostname }}'
        username: '{{ vcenter_username }}'
        password: '{{ vcenter_password }}'
        validate_certs: no
        datacenter_name: '{{ datacenter_name }}'
        cluster_name: '{{ cluster_name }}'
      delegate_to: localhost

    - name: 03.Add ESX Host to cluster
      community.vmware.vmware_host:
        hostname: '{{ vcenter_hostname }}'
        username: '{{ vcenter_username }}'
        password: '{{ vcenter_password }}'
        validate_certs: no
        datacenter_name: '{{ datacenter_name }}'
        cluster_name: '{{ cluster_name }}'
        esxi_hostname: '{{ item.name }}'
        esxi_username: 'root'
        esxi_password: "{{ host_password }}"
        state: present
        loop: "{{ cluster_hosts }}"
      delegate_to: localhost

    - name: 04.Create dvSwitch
      community.vmware.vmware_dvswitch:
        hostname: '{{ vcenter_hostname }}'
        username: '{{ vcenter_username }}'
        password: '{{ vcenter_password }}'
        datacenter: '{{ datacenter_name }}'
        switch: dvSwitch
        version: 9.0.0
        mtu: 9000
        uplink_quantity: 2
        state: present
      delegate_to: localhost

    - name: 05.Add Hosts to dVS
      community.vmware.vmware_dvs_host:
        hostname: '{{ vcenter_hostname }}'
        username: '{{ vcenter_username }}'
        password: '{{ vcenter_password }}'
        esxi_hostname: '{{ item.name }}'
        switch_name: dvSwitch
        vmnics:
          - vmnic1
          - vmnic3
        state: present
      loop: "{{ cluster_hosts }}"
      delegate_to: localhost

    - name: 06.Create iSCSI-P1 Portgroup
      community.vmware.vmware_dvs_portgroup:
        hostname: '{{ vcenter_hostname }}'
        username: '{{ vcenter_username }}'
        password: '{{ vcenter_password }}'
        portgroup_name: iSCSI-P1
        switch_name: dvSwitch
        vlan_id: 11
        state: present
        port_binding: static
        teaming_policy:
          load_balance_policy: failover_explicit
          rolling_order: "true"
          active_uplinks: "Uplink 1"
      delegate_to: localhost

    - name: 07.Create iSCSI-P2 Portgroup
      community.vmware.vmware_dvs_portgroup:
        hostname: '{{ vcenter_hostname }}'
        username: '{{ vcenter_username }}'
        password: '{{ vcenter_password }}'
        portgroup_name: iSCSI-P2
        switch_name: dvSwitch
        vlan_id: 11
        state: present
        port_binding: static
        teaming_policy:
          load_balance_policy: failover_explicit
          rolling_order: "true"
          active_uplinks: "Uplink 2"
      delegate_to: localhost

    - name: 08.Add 1st iSCSI vmkernel port
      community.vmware.vmware_vmkernel:
        hostname: '{{ vcenter_hostname }}'
        username: '{{ vcenter_username }}'
        password: '{{ vcenter_password }}'
        esxi_hostname: '{{ item.name }}'
        dvswitch_name: dvSwitch
        portgroup_name: iSCSI-P1
        network:
          type: 'static'
          ip_address: "{{ item.ip_iscsi_1 }}"
          subnet_mask: 255.255.255.0
        state: present
      loop: "{{ cluster_hosts }}"
      delegate_to: localhost

    - name: 09.Add 2nd iSCSI vmkernel port
      community.vmware.vmware_vmkernel:
        hostname: '{{ vcenter_hostname }}'
        username: '{{ vcenter_username }}'
        password: '{{ vcenter_password }}'
        esxi_hostname: '{{ item.name }}'
        dvswitch_name: dvSwitch
        portgroup_name: iSCSI-P2
        network:
          type: 'static'
          ip_address: "{{ item.ip_iscsi_2 }}"
          subnet_mask: 255.255.255.0
        state: present
      loop: "{{ cluster_hosts }}"
      delegate_to: localhost

    - name: 10.Enable iSCSI 
      community.vmware.vmware_host_iscsi:
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        esxi_hostname: "{{ item.name }}"
        state: enabled
      loop: "{{ cluster_hosts }}"
      delegate_to: localhost

    - name: 11.iSCSI (vmhba64) Port binding
      community.vmware.vmware_host_iscsi:
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        esxi_hostname: "{{ item.name }}"
        iscsi_config:
          vmhba_name: vmhba64
          port_bind:
            - vmk1
            - vmk2
        state: present
      loop: "{{ cluster_hosts }}"
      delegate_to: localhost

    - name: 12.Add a dynamic target to iSCSI config of ESXi
      community.vmware.vmware_host_iscsi:
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        esxi_hostname: "{{ esxi_hostname }}"
        iscsi_config:
          vmhba_name: vmhba65
          send_target:
            address: "{{ iscsi_target_ip }}"
        state: present
      loop: "{{ cluster_hosts }}"
      delegate_to: localhost

    - name: 13.Recan HBA for cluster
      community.vmware.vmware_host_scanhba:
        hostname: '{{ vcenter_hostname }}'
        username: '{{ vcenter_username }}'
        password: '{{ vcenter_password }}'
        cluster_name: '{{ cluster_name }}'
        rescan_hba: true
      delegate_to: localhost

    - name: 14.Wait for complete rescan HBA
      wait_for:
        timeout: 10
      delegate_to: localhost

    - name: 15.Disable ESXi Maintenance Mode On A Host
      vmware.vmware.esxi_maintenance_mode:
        hostname: '{{ vcenter_hostname }}'
        username: '{{ vcenter_username }}'
        password: '{{ vcenter_password }}'
        name: "{{ item.name }}"
        enable_maintenance_mode: false
      loop: "{{ cluster_hosts }}"
      delegate_to: localhost

    - name: 16.Create iSCSI-0 Datastore
      community.vmware.vmware_host_datastore:
        hostname: '{{ vcenter_hostname }}'
        username: '{{ vcenter_username }}'
        password: '{{ vcenter_password }}'
        esxi_hostname: "esx-01.vclass.local"
        datastore_name: "iSCSI-0"
        datastore_type: "vmfs"
        vmfs_device_name: 'naa.XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX'
        vmfs_version: 6
        state: present
      delegate_to: localhost

    - name: 17.Create iSCSI-1 Datastore
      community.vmware.vmware_host_datastore:
        hostname: '{{ vcenter_hostname }}'
        username: '{{ vcenter_username }}'
        password: '{{ vcenter_password }}'
        esxi_hostname: "esx-01.vclass.local"
        datastore_name: "iSCSI-1"
        datastore_type: "vmfs"
        vmfs_device_name: 'naa.XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX'
        vmfs_version: 6
        state: present
      delegate_to: localhost

    - name: 18.Create Local Content Library
      community.vmware.vmware_content_library_manager:
        hostname: '{{ vcenter_hostname }}'
        username: '{{ vcenter_username }}'
        password: '{{ vcenter_password }}'
        library_name: DevOps
        library_type: local
        datastore_name: iSCSI-0
        state: present
      delegate_to: localhost

    - name: 19.Upload an OVF From The Ansible Host
      vmware.vmware.import_content_library_ovf:
        hostname: '{{ vcenter_hostname }}'
        username: '{{ vcenter_username }}'
        password: '{{ vcenter_password }}'
        library_name: "DevOps"
        src: /mnt/c/Users/Administrator/Downloads/photon-hw15-5.0-dde71ec57.x86_64.ova
        dest: photon-5.0
      delegate_to: localhost

    - name: 20.Deploy VM From Contents Library
      vmware.vmware.deploy_content_library_ovf:
        hostname: '{{ vcenter_hostname }}'
        username: '{{ vcenter_username }}'
        password: '{{ vcenter_password }}'
        library_item_name: photon-5.0
        library_name: DevOps
        vm_name: Temp_Container_Host
        datacenter: "{{ datacenter_name }}" 
        datastore: iSCSI-0
    
    - name: 21.Create project portgroup
      community.vmware.vmware_dvs_portgroup:
        hostname: '{{ vcenter_hostname }}'
        username: '{{ vcenter_username }}'
        password: '{{ vcenter_password }}'
        portgroup_name: "{{ item.name }}"
        switch_name: DSwitch
        vlan_id: "{{ item.vlan }""
        port_binding: static
        state: present
      loop: {{ project_pgs }}  
      delegate_to: localhost

    - name: 22.Add vMotion vmkernel port
      community.vmware.vmware_vmkernel:
        hostname: '{{ vcenter_hostname }}'
        username: '{{ vcenter_username }}'
        password: '{{ vcenter_password }}'
        esxi_hostname: '{{ item.name }}'
        dvswitch_name: DSwitch
        portgroup_name: DPG-vMotion
        network:
          type: 'static'
          ip_address: '{{ item.ip_vmotion }}'
          subnet_mask: 255.255.255.0
          tcpip_stack: vmotion
        state: present
        enable_vmotion: yes
      loop: "{{ cluster_hosts }}"
      delegate_to: localhost

    - name: 23.vmoption tcp/ip stack gateway
      community.vmware.vmware_host_tcpip_stacks:
        hostname: "{{ item.name }}"
        username: "root"
        password: "{{ host_password }}"
        validate_certs: no
        esxi_hostname: "{{ item.name }}"
        vmotion:
          gateway: 10.10.12.1
      loop: "{{ cluster_hosts }}"
      delegate_to: localhost    

    - name: 24.Enable DRS
      community.vmware.vmware_cluster_drs:
        hostname: '{{ vcenter_hostname }}'
        username: '{{ vcenter_username }}'
        password: '{{ vcenter_password }}'
        validate_certs: no        
        datacenter_name: '{{ datacenter_name }}'
        cluster_name: '{{ cluster_name }}'
        enable: true
      delegate_to: localhost    



    - name: 05. Deploy Project VMs
      community.vmware.vmware_guest:
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        validate_certs: no
        name: "{{ item.name }}"
        datacenter: "{{ datacenter_name }}"
        esxi_hostname: "{{ item[0].host }}"
        datastore: "{{ item[0].datastore }}"
        template: "{{ item[0].host }}{{ item[1] }}"
        linked_clone: True
        snapshot_src: "linked"
      loop: "{{ project_vms }}"
      delegate_to: localhost

    - name: 20.Create vlan portgroup - Production - 13
      community.vmware.vmware_dvs_portgroup:
        hostname: '{{ vcenter_hostname }}'
        username: '{{ vcenter_username }}'
        password: '{{ vcenter_password }}'
        validate_certs: no        
        portgroup_name: DPG-Prod-Internal
        switch_name: DSwitch
        vlan_id: 13
        port_binding: static
        state: present
      delegate_to: localhost


    - name: 21.Enable HA with admission control FTT=1
      community.vmware.vmware_cluster_ha:
        hostname: '{{ vcenter_hostname }}'
        username: '{{ vcenter_username }}'
        password: '{{ vcenter_password }}'
        validate_certs: no        
        datacenter_name: '{{ datacenter_name }}'
        cluster_name: '{{ cluster_name }}'
        enable: true
        reservation_based_admission_control:
          auto_compute_percentages: True
          failover_level: 1
      delegate_to: localhost    
      
